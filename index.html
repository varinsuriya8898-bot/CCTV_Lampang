<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศูนย์เฝ้าระวัง CCTV — Dashboard</title>

<!-- Leaflet (แผนที่) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>

<!-- hls.js (เล่นสตรีม .m3u8 เช่น กล้องกรมทางหลวง) -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>

<!-- Tabler Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">

<!-- ฟอนต์ไทย -->
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0b0f17;
    --panel: #111827;
    --panel-2: #1a2332;
    --line: #243044;
    --text: #e5edf8;
    --muted: #8ea3bf;
    --accent: #38bdf8;
    --ok: #34d399;
    --warn: #f6ad37;
    --danger: #ff5470;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Sarabun", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  h1, h2, h3, .brand { font-family: "Chakra Petch", "Sarabun", sans-serif; }

  /* ===== Header ===== */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .brand-badge {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    display: grid; place-items: center; font-size: 22px; color: #fff;
  }
  .brand h1 { font-size: 17px; letter-spacing: .3px; }
  .brand p { font-size: 12px; color: var(--muted); }
  .spacer { flex: 1; }
  .clock { text-align: right; }
  .clock .time { font-family: "Chakra Petch"; font-size: 20px; color: var(--accent); }
  .clock .date { font-size: 12px; color: var(--muted); }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel-2); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 999px; font-size: 13px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ok);
         box-shadow: 0 0 8px var(--ok); animation: pulse 1.6s infinite; }
  @keyframes pulse { 50% { opacity: .35; } }

  /* ===== Layout ===== */
  .wrap { flex: 1; display: flex; min-height: 0; }

  /* Sidebar */
  aside {
    width: 320px; flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column; min-height: 0;
  }
  .filters { display: flex; gap: 6px; padding: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--line); }
  .chip {
    border: 1px solid var(--line); background: var(--panel-2); color: var(--muted);
    padding: 6px 12px; border-radius: 999px; font-size: 12.5px; cursor: pointer;
    font-family: "Sarabun"; transition: .15s;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #06202e; font-weight: 600; }
  .cam-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .cam-item {
    display: flex; gap: 12px; align-items: center;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 10px 12px; cursor: pointer; transition: .15s;
  }
  .cam-item:hover { border-color: var(--accent); transform: translateX(2px); }
  .cam-item.selected { border-color: var(--accent); background: #14263a; }
  .cam-num {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    display: grid; place-items: center; font-family: "Chakra Petch"; font-weight: 700;
    color: #fff; font-size: 15px;
  }
  .cam-item b { font-size: 13.5px; font-weight: 600; display: block; }
  .cam-item span { font-size: 11.5px; color: var(--muted); }

  /* Main */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  .seg { display: flex; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .seg button {
    background: none; border: none; color: var(--muted); font-family: "Sarabun";
    padding: 8px 14px; font-size: 13px; cursor: pointer;
  }
  .seg button.active { background: var(--accent); color: #06202e; font-weight: 600; }
  .toolbar .label { font-size: 12px; color: var(--muted); margin-left: 6px; }

  .content { flex: 1; position: relative; min-height: 0; }

  /* Grid view */
  #gridView {
    position: absolute; inset: 0; padding: 12px; overflow-y: auto;
    display: grid; gap: 12px; align-content: start;
  }
  #gridView.cols-1 { grid-template-columns: 1fr; }
  /* โหมด 1×1: กล้องเดียว จัดกลาง + จำกัดความสูงให้พอดีจอ */
  #gridView.cols-1 .tile { width: 100%; max-width: calc((100vh - 235px) * 16 / 9); margin-inline: auto; }
  #gridView.cols-2 { grid-template-columns: repeat(2, 1fr); }
  #gridView.cols-3 { grid-template-columns: repeat(3, 1fr); }
  #gridView.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .tile.paged-hidden { display: none !important; }   /* ซ่อนกล้องที่ไม่อยู่ในหน้าปัจจุบัน (ยังต่อสตรีมไว้เบื้องหลัง) */
  .tile {
    background: #000; border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .tile .head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--panel); font-size: 13px;
  }
  .tile .head .badge {
    margin-left: auto; font-size: 10.5px; font-family: "Chakra Petch";
    padding: 1px 8px; border-radius: 999px;
  }
  /* LIVE = สีเขียว (แก้สีตรงนี้ได้: เปลี่ยน var(--ok) เป็นสีที่ต้องการ) */
  .tile .head .badge.live { color: var(--ok); border: 1px solid var(--ok); }
  /* OFFLINE = สีเทา */
  .tile .head .badge.offline { color: var(--muted); border: 1px solid var(--muted); }
  .tile .video { aspect-ratio: 16/9; position: relative; flex-shrink: 0; }
  .tile iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; }
  .tile .video video { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; object-fit: cover; cursor: pointer; }
  /* แผ่นคลุมแสดงสถานะ (กำลังเชื่อมต่อ / OFFLINE) วางทับวิดีโอ */
  .offline-overlay {
    position: absolute; inset: 0; z-index: 2;
    display: grid; place-items: center; align-content: center; gap: 6px;
    background: #0d1420; color: var(--muted); text-align: center;
  }
  .offline-overlay.hidden { display: none; }
  .offline-overlay .ti { font-size: 36px; opacity: .75; }
  .offline-overlay .txt { font-family: "Chakra Petch"; font-size: 15px; letter-spacing: 1px; }
  .offline-overlay.connecting .ti { animation: spin 1s linear infinite; color: var(--accent); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Map view */
  #mapView { position: absolute; inset: 0; display: none; }
  #map { width: 100%; height: 100%; background: #0b0f17; }
  /* ปุ่มสลับชั้นแผนที่ (โหมดมืด / ดาวเทียม) */
  .map-layers {
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    display: flex; gap: 4px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 4px; box-shadow: 0 4px 14px rgba(0,0,0,.4);
  }
  .map-layers button {
    background: none; border: none; color: var(--muted); font-family: "Sarabun";
    padding: 6px 12px; border-radius: 7px; cursor: pointer; font-size: 12.5px;
    display: flex; align-items: center; gap: 5px;
  }
  .map-layers button.active { background: var(--accent); color: #06202e; font-weight: 600; }
  /* หมุดกล้องแบบวงกลม + คลื่นเรดาร์ */
  .cam-divicon { background: transparent; border: none; }   /* ลบกล่องขาวเริ่มต้นของ Leaflet */
  .cam-marker { position: relative; width: 40px; height: 40px; }
  .cam-marker .core {
    position: absolute; inset: 0; border-radius: 50%;
    background: var(--c); display: grid; place-items: center; color: #fff;
    border: 2.5px solid #fff; box-shadow: 0 3px 12px rgba(0,0,0,.55); z-index: 2;
  }
  .cam-marker .core .ti { font-size: 18px; }
  .cam-marker .num {
    position: absolute; top: -4px; right: -4px; z-index: 3;
    min-width: 17px; height: 17px; padding: 0 3px; border-radius: 999px;
    background: #0b0f17; color: #fff; border: 1.5px solid var(--c);
    font-family: "Chakra Petch"; font-size: 10.5px; font-weight: 700;
    display: grid; place-items: center;
  }
  .cam-marker .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid var(--c); z-index: 1;
    animation: radar 2.4s ease-out infinite;
  }
  .cam-marker .ring.d { animation-delay: 1.2s; }
  .cam-marker.offline .ring { animation-duration: 3.4s; opacity: .6; }  /* ออฟไลน์ = คลื่นช้ากว่า */
  @keyframes radar {
    0%   { transform: scale(.55); opacity: .75; }
    100% { transform: scale(2.1);  opacity: 0; }
  }
  .leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border-radius: 12px; }
  .leaflet-popup-tip { background: var(--panel); }

  .tb-spacer { flex: 1; }   /* ดันเครื่องมือที่เหลือไปชิดขวา */
  /* ปุ่มเปลี่ยนหน้า (paging) */
  .pager { display: none; align-items: center; gap: 6px; }
  .pager button {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 15px;
  }
  .pager button:hover { border-color: var(--accent); }
  .pager span { font-size: 12.5px; color: var(--muted); min-width: 42px; text-align: center; }
  /* ปุ่ม/แถบเครื่องมือแก้ตำแหน่งหมุด */
  .toolbtn {
    display: none; align-items: center; gap: 6px;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    padding: 7px 12px; border-radius: 8px; cursor: pointer; font-family: "Sarabun"; font-size: 12.5px;
  }
  .toolbtn:hover { border-color: var(--accent); }
  .toolbtn.on { background: var(--warn); border-color: var(--warn); color: #2a1e05; font-weight: 600; }
  /* แถบคำแนะนำตอนแก้หมุด */
  .edit-hint {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: var(--warn); color: #2a1e05; font-weight: 600;
    padding: 8px 16px; border-radius: 999px; font-size: 13px; box-shadow: 0 6px 20px rgba(0,0,0,.4);
    display: none;
  }
  /* ป๊อปอัปแจ้งเตือนสั้นๆ */
  #toast {
    position: fixed; bottom: 46px; left: 50%; transform: translateX(-50%);
    background: var(--ok); color: #06251b; font-weight: 600; padding: 10px 18px;
    border-radius: 10px; font-size: 13px; z-index: 3000; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  #toast.show { opacity: 1; }
  /* หมุดตอนโหมดแก้ไข = ลากได้ (เปลี่ยน cursor) */
  .leaflet-marker-draggable { cursor: grab; }
  .popup-player { width: 340px; }
  .popup-player b { font-family: "Chakra Petch"; font-size: 14px; }
  .popup-player .pv { margin-top: 8px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; }
  .popup-player iframe { width: 100%; height: 100%; border: 0; background: #000; }
  .popup-player video { width: 100%; height: 100%; background: #000; object-fit: cover; }

  footer {
    padding: 8px 20px; font-size: 11.5px; color: var(--muted);
    border-top: 1px solid var(--line); background: var(--panel); flex-shrink: 0;
    display: flex; gap: 18px;
  }
  @media (max-width: 900px) {
    /* วางแนวตั้ง: แถบกรอง (บน) → จอภาพ/แผนที่ (ล่าง) */
    .wrap { flex-direction: column; }
    aside {
      width: 100%; flex-direction: row; min-height: 0;
      border-right: none; border-bottom: 1px solid var(--line);
    }
    .filters { flex-wrap: nowrap; overflow-x: auto; border-bottom: none; width: 100%; padding: 8px 10px; }
    .chip { flex-shrink: 0; padding: 7px 13px; }   /* กดง่ายขึ้น + ไม่ย่อ */
    .cam-list { display: none; }                    /* ซ่อนลิสต์กล้องยาวๆ บนมือถือ */
    /* หัวเว็บ + แถบเครื่องมือ: ให้ตัดบรรทัดได้ ไม่ล้นจอ */
    header { flex-wrap: wrap; gap: 8px 12px; padding: 10px 14px; }
    header .spacer { display: none; }
    .brand h1 { font-size: 15px; }
    .clock { margin-left: auto; }
    .clock .time { font-size: 17px; }
    .toolbar { flex-wrap: wrap; gap: 8px; padding: 8px 12px; }
    .tb-spacer { display: none; }
    .toolbar .label { display: none; }              /* ประหยัดที่ */
    #gridView { padding: 8px; }
    #gridView.cols-2, #gridView.cols-3, #gridView.cols-4 { grid-template-columns: 1fr; }
    #gridView.cols-1 .tile { max-width: none; }
  }
</style>
</head>
<body>

<header>
  <div class="brand-badge"><i class="ti ti-video"></i></div>
  <div class="brand">
    <h1 id="orgName">ศูนย์เฝ้าระวัง CCTV</h1>
    <p id="orgSub">ระบบบริหารจัดการกล้องวงจรปิด</p>
  </div>
  <div class="spacer"></div>
  <div class="status-pill"><span class="dot"></span><span id="statCams">0 กล้อง</span></div>
  <div class="clock">
    <div class="time" id="clockTime">--:--:--</div>
    <div class="date" id="clockDate">-</div>
  </div>
</header>

<div class="wrap">
  <aside>
    <div class="filters" id="filterBar"></div>
    <div class="cam-list" id="camList"></div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="seg" id="viewSeg">
        <button data-view="grid" class="active"><i class="ti ti-layout-grid"></i> จอภาพ</button>
        <button data-view="map"><i class="ti ti-map-2"></i> แผนที่</button>
      </div>
      <span class="label" id="layoutLabel">รูปแบบจอ:</span>
      <div class="seg" id="layoutSeg">
        <button data-cols="1">1×1</button>
        <button data-cols="2" class="active">2×2</button>
        <button data-cols="3">3×3</button>
        <button data-cols="4">4×4</button>
      </div>

      <div class="tb-spacer"></div>

      <!-- ปุ่มรีเฟรชเฉพาะกล้องในหน้านี้ (ไม่รีเซ็ตเลย์เอาต์แบบ F5) -->
      <button class="toolbtn" id="refreshGrid" title="โหลดกล้องในหน้านี้ใหม่"><i class="ti ti-refresh"></i> รีเฟรช</button>

      <!-- ปุ่มเปลี่ยนหน้า (โชว์เฉพาะหน้าจอภาพเมื่อมีหลายหน้า) -->
      <div class="pager" id="pager">
        <button id="pagerPrev" title="หน้าก่อน">‹</button>
        <span id="pagerLabel">1/1</span>
        <button id="pagerNext" title="หน้าถัดไป">›</button>
      </div>

      <!-- ปุ่มแก้ตำแหน่งหมุด (โชว์เฉพาะหน้าแผนที่) -->
      <button class="toolbtn" id="editPins"><i class="ti ti-map-pin-cog"></i> แก้ตำแหน่งหมุด</button>
      <button class="toolbtn ghost" id="copyPins" style="display:none"><i class="ti ti-copy"></i> คัดลอกพิกัด</button>
      <button class="toolbtn ghost" id="resetPins" style="display:none"><i class="ti ti-rotate"></i> รีเซ็ต</button>
    </div>

    <div class="content">
      <div id="gridView" class="cols-2"></div>
      <div id="mapView">
        <div id="map"></div>
        <div class="map-layers" id="mapLayers">
          <button data-layer="dark" class="active"><i class="ti ti-moon"></i> โหมดมืด</button>
          <button data-layer="sat"><i class="ti ti-satellite"></i> ดาวเทียม</button>
        </div>
        <div class="edit-hint" id="editHint"><i class="ti ti-hand-move"></i> ลากหมุดไปยังตำแหน่งที่ถูกต้อง — ระบบบันทึกให้อัตโนมัติ</div>
      </div>
    </div>
  </main>
</div>
<div id="toast"></div>

<footer>
  <span><i class="ti ti-shield-lock"></i> สตรีมผ่าน Gateway — ไม่มีการเปิดเผยรหัสผ่านกล้องบนหน้าเว็บ</span>
  <span id="gwLabel"></span>
</footer>

<!-- ข้อมูลกล้องทั้งหมดแก้ไขได้ที่ไฟล์ cameras.js -->
<script src="cameras.js"></script>
<script>
/* ================= Utilities ================= */
const $ = (s) => document.querySelector(s);
const playerUrl = (cam) =>
  `${CONFIG.gatewayUrl.replace(/\/$/, "")}/${CONFIG.playerPage}?src=${encodeURIComponent(cam.src)}`;

// รันบนเครื่องตัวเอง (localhost/ไฟล์) → เปิดปุ่มแก้หมุด | ขึ้น GitHub → ซ่อน
const IS_LOCAL = ["localhost", "127.0.0.1", ""].includes(location.hostname);

/* ================= Header / นาฬิกา ================= */
$("#orgName").textContent = CONFIG.orgName;
$("#orgSub").textContent = CONFIG.orgSub;
$("#gwLabel").textContent = `Gateway: ${CONFIG.gatewayUrl}`;
function tickClock() {
  const now = new Date();
  $("#clockTime").textContent = now.toLocaleTimeString("th-TH", { hour12: false });
  $("#clockDate").textContent = now.toLocaleDateString("th-TH", {
    weekday: "long", year: "numeric", month: "long", day: "numeric",
  });
}
tickClock(); setInterval(tickClock, 1000);

/* ================= State ================= */
let activeFilter = "all";
let selectedCamId = null;
let layoutCols = 2;      // 1=1×1, 2=2×2, 3=3×3
let gridPage = 0;        // หน้าปัจจุบันของจอภาพ
let editMode = false;    // โหมดแก้ตำแหน่งหมุด

const filtered = () =>
  CAMERAS.filter((c) => activeFilter === "all" || c.type === activeFilter);

/* ================= Filter bar ================= */
function renderFilters() {
  const bar = $("#filterBar");
  bar.innerHTML = "";
  const mk = (key, label) => {
    const b = document.createElement("button");
    b.className = "chip" + (activeFilter === key ? " active" : "");
    b.textContent = label;
    b.onclick = () => { activeFilter = key; selectedCamId = null; renderAll(); };
    bar.appendChild(b);
  };
  mk("all", `ทั้งหมด (${CAMERAS.length})`);
  for (const [key, t] of Object.entries(CAMERA_TYPES)) {
    const n = CAMERAS.filter((c) => c.type === key).length;
    if (n) mk(key, `${t.label} (${n})`);
  }
}

/* ================= Sidebar list ================= */
function renderList() {
  const list = $("#camList");
  list.innerHTML = "";
  for (const cam of filtered()) {
    const t = CAMERA_TYPES[cam.type];
    const el = document.createElement("div");
    el.className = "cam-item" + (cam.id === selectedCamId ? " selected" : "");
    el.innerHTML = `
      <div class="cam-num" style="background:${t.color}">${cam.id}</div>
      <div><b>${cam.name}</b><span>${cam.desc}</span></div>`;
    el.onclick = () => {
      selectedCamId = cam.id;
      renderList();               // อัปเดตไฮไลต์รายการที่เลือก
      focusCameraOnMap(cam);      // ไปแผนที่ + ซูม + เปิดป๊อปอัปกล้องนั้น
    };
    list.appendChild(el);
  }
  const onlineCount = filtered().filter((c) => camStatus[c.src] === true).length;
  $("#statCams").textContent = `${onlineCount}/${filtered().length} กล้องออนไลน์`;
}

/* ================= Grid view ================= */
function renderGrid() {
  const grid = $("#gridView");
  grid.innerHTML = "";
  // สร้างทุกกล้อง (iframe ต่อสตรีมไว้ตลอดเพื่อให้ตรวจสถานะแม่น) แล้วค่อยซ่อนตัวที่ไม่อยู่ในหน้า
  for (const cam of filtered()) {
    const t = CAMERA_TYPES[cam.type];
    const tile = document.createElement("div");
    tile.className = "tile";
    // กล้อง HLS ใช้ <video>, กล้อง gateway ใช้ <iframe>
    const media = cam.hls
      ? `<video data-cam="${cam.src}" muted autoplay playsinline></video>`
      : `<iframe src="${playerUrl(cam)}" allow="autoplay; fullscreen" loading="lazy"></iframe>`;
    tile.innerHTML = `
      <div class="head">
        <i class="ti ${t.icon}" style="color:${t.color}"></i>
        <span>${cam.id}. ${cam.name}</span>
        <span class="badge" data-badge="${cam.src}">…</span>
      </div>
      <div class="video" data-cam="${cam.src}">
        ${media}
        <div class="offline-overlay connecting" data-overlay="${cam.src}">
          <i class="ti ti-loader-2"></i>
          <div class="txt">กำลังเชื่อมต่อ…</div>
        </div>
      </div>`;
    grid.appendChild(tile);
  }
  // DOM ถูกสร้างใหม่ → ล้างตัวเล่น HLS เก่าทิ้ง
  for (const k in hlsPool) { try { hlsPool[k] && hlsPool[k].destroy(); } catch {} }
  for (const k in hlsPool) delete hlsPool[k];
  for (const k in hlsAttached) delete hlsAttached[k];
  applyPaging();      // ตั้งคอลัมน์/หน้า แล้วเริ่มเล่น HLS เฉพาะกล้องที่แสดงอยู่
  applyAllStatus();   // ทาสถานะล่าสุดที่รู้ทันที (กันภาพกระพริบตอนสลับ filter)
}

/* ============ ตัวเล่นสตรีม HLS (.m3u8) ด้วย hls.js ============ */
const hlsPool = {};      // src -> Hls instance
const hlsAttached = {};  // src -> กำลังเล่นอยู่ไหม
function playHls(videoEl, url) {
  if (!videoEl) return null;
  // Safari เล่น HLS ได้เอง
  if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
    videoEl.src = url;
    videoEl.play().catch(() => {});
    return null;
  }
  if (window.Hls && Hls.isSupported()) {
    const hls = new Hls({
      liveDurationInfinity: true,
      maxBufferLength: 10,          // เก็บบัฟเฟอร์น้อยลง = เบาลงเมื่อเปิดหลายจอ
      liveSyncDurationCount: 3,
      fragLoadingMaxRetry: 6,
      manifestLoadingMaxRetry: 4,
      levelLoadingMaxRetry: 4,
    });
    let mediaRecover = 0;
    hls.loadSource(url);
    hls.attachMedia(videoEl);
    hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
    // กู้คืนอัตโนมัติเมื่อสะดุด แทนที่จะยอมแพ้ (นี่คือสาเหตุจอดำเดิม)
    hls.on(Hls.Events.ERROR, (_e, data) => {
      if (!data.fatal) return;
      if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
        hls.startLoad();                              // โหลดต่อใหม่
      } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
        if (mediaRecover++ < 3) hls.recoverMediaError();
        else { try { hls.destroy(); } catch {} }
      } else {
        try { hls.destroy(); } catch {}
      }
    });
    return hls;
  }
  return null;
}
/* เล่นเฉพาะกล้อง HLS ที่มองเห็นอยู่ (หน้าปัจจุบัน + อยู่แท็บจอภาพ) — ลดภาระเครื่อง */
function attachAllHls() {
  const gridActive = $("#gridView").style.display !== "none";
  for (const cam of CAMERAS) {
    if (!cam.hls) continue;
    const box = document.querySelector(`.video[data-cam="${cam.src}"]`);
    if (!box) continue;
    const v = box.querySelector("video");
    if (!v) continue;
    const tile = box.closest(".tile");
    const visible = gridActive && !(tile && tile.classList.contains("paged-hidden"));
    if (visible && !hlsAttached[cam.src]) {
      hlsPool[cam.src] = playHls(v, cam.hls);
      hlsAttached[cam.src] = true;
    } else if (!visible && hlsAttached[cam.src]) {
      if (hlsPool[cam.src]) { try { hlsPool[cam.src].destroy(); } catch {} hlsPool[cam.src] = null; }
      try { v.pause(); v.removeAttribute("src"); v.load(); } catch {}
      hlsAttached[cam.src] = false;
    }
  }
}

/* จำนวนช่องต่อหน้า และจำนวนหน้าทั้งหมด */
const pageSize = () => layoutCols * layoutCols;      // 1×1=1, 2×2=4, 3×3=9
const totalPages = () => Math.max(1, Math.ceil(filtered().length / pageSize()));

/* ตั้งคอลัมน์ + ซ่อนกล้องที่ไม่อยู่ในหน้าปัจจุบัน + อัปเดตปุ่มเปลี่ยนหน้า */
function applyPaging() {
  const grid = $("#gridView");
  grid.className = `cols-${layoutCols}`;
  if (gridPage > totalPages() - 1) gridPage = totalPages() - 1;
  if (gridPage < 0) gridPage = 0;
  const start = gridPage * pageSize();
  const end = start + pageSize();
  [...grid.children].forEach((tile, i) => {
    tile.classList.toggle("paged-hidden", i < start || i >= end);
  });
  // ปุ่มเปลี่ยนหน้า: โชว์เฉพาะตอนอยู่หน้าจอภาพและมีมากกว่า 1 หน้า
  const inGrid = $("#gridView").style.display !== "none";
  const pager = $("#pager");
  if (inGrid && totalPages() > 1) {
    pager.style.display = "flex";
    $("#pagerLabel").textContent = `${gridPage + 1}/${totalPages()}`;
  } else {
    pager.style.display = "none";
  }
  attachAllHls();   // เล่น/หยุดกล้อง HLS ตามที่มองเห็นในหน้านี้
}

/* ================= Map view ================= */
let map, markerLayer, darkLayer, satLayer, currentBasemap = "dark", popupHls = null;
const markers = {};   // เก็บอ้างอิงหมุดแต่ละกล้อง (src -> marker) เพื่อสั่งเปิดป๊อปอัป
function initMap() {
  if (map) return;
  map = L.map("map", { zoomControl: true }).setView(CONFIG.mapCenter, CONFIG.mapZoom);
  // ป๊อปอัปกล้อง HLS: เริ่มเล่นตอนเปิด, หยุดตอนปิด (ประหยัดทรัพยากร)
  map.on("popupopen", (e) => {
    const v = e.popup.getElement()?.querySelector("video[data-cam]");
    if (!v) return;
    const cam = CAMERAS.find((c) => c.src === v.dataset.cam);
    if (cam && cam.hls) {
      if (popupHls) { try { popupHls.destroy(); } catch {} }
      popupHls = playHls(v, cam.hls);
    }
  });
  map.on("popupclose", () => {
    if (popupHls) { try { popupHls.destroy(); } catch {} popupHls = null; }
  });
  // ชั้นแผนที่โหมดมืด (CARTO)
  darkLayer = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap &copy; CARTO",
  });
  // ชั้นภาพดาวเทียม + ชื่อถนน (Google — แบบเดียวกับเว็บต้นแบบ)
  satLayer = L.tileLayer("https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}", {
    maxZoom: 20,
    subdomains: ["mt0", "mt1", "mt2", "mt3"],
    attribution: "&copy; Google",
  });
  (currentBasemap === "sat" ? satLayer : darkLayer).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

/* สลับชั้นแผนที่ระหว่าง โหมดมืด / ดาวเทียม */
function setBasemap(which) {
  if (!map || which === currentBasemap) return;
  if (which === "sat") { map.removeLayer(darkLayer); satLayer.addTo(map); }
  else { map.removeLayer(satLayer); darkLayer.addTo(map); }
  currentBasemap = which;
  document.querySelectorAll("#mapLayers button").forEach((b) =>
    b.classList.toggle("active", b.dataset.layer === which));
}
document.querySelectorAll("#mapLayers button").forEach((b) =>
  b.addEventListener("click", () => setBasemap(b.dataset.layer)));
function renderMarkers() {
  if (!map) return;
  markerLayer.clearLayers();
  for (const k in markers) delete markers[k];
  for (const cam of filtered()) {
    const t = CAMERA_TYPES[cam.type];
    // กล้อง offline = หมุดสีเทา (ใช้สถานะสดจากการตรวจอัตโนมัติ)
    const isOffline = camStatus[cam.src] === false;
    const pinColor = isOffline ? "#64748b" : t.color;
    const icon = L.divIcon({
      className: "cam-divicon",
      html: `<div class="cam-marker ${isOffline ? "offline" : ""}" style="--c:${pinColor}">
               <span class="ring"></span>
               <span class="ring d"></span>
               <span class="core"><i class="ti ti-video"></i></span>
               <span class="num">${cam.id}</span>
             </div>`,
      iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20],
    });
    const preview = isOffline
      ? `<div class="pv" style="display:grid;place-items:center;background:#0d1420;color:#8ea3bf;font-family:'Chakra Petch'">OFFLINE</div>`
      : cam.hls
      ? `<div class="pv"><video data-cam="${cam.src}" muted autoplay playsinline></video></div>`
      : `<div class="pv"><iframe src="${playerUrl(cam)}" allow="autoplay; fullscreen"></iframe></div>`;
    const marker = L.marker([cam.lat, cam.lng], { icon, draggable: editMode })
      .bindPopup(
        `<div class="popup-player">
           <b>${cam.id}. ${cam.name}</b>
           <div style="font-size:12px;color:#8ea3bf">${cam.desc}</div>
           ${preview}
         </div>`,
        { maxWidth: 380 }
      )
      .addTo(markerLayer);
    // โหมดแก้ไข: ลากหมุดแล้วบันทึกพิกัดใหม่อัตโนมัติ
    marker.on("dragend", (e) => {
      const ll = e.target.getLatLng();
      cam.lat = +ll.lat.toFixed(6);
      cam.lng = +ll.lng.toFixed(6);
      savePosition(cam);
      showToast(`บันทึกตำแหน่ง: ${cam.name}`);
    });
    markers[cam.src] = marker;
  }
}

/* ============ แก้ตำแหน่งหมุดบนหน้าเว็บ (บันทึกในเบราว์เซอร์) ============ */
const POS_KEY = "cctv_positions_v1";
function loadPositions() {
  try {
    const saved = JSON.parse(localStorage.getItem(POS_KEY) || "{}");
    CAMERAS.forEach((c) => {
      if (saved[c.src]) { c.lat = saved[c.src][0]; c.lng = saved[c.src][1]; }
    });
  } catch {}
}
function savePosition(cam) {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(POS_KEY) || "{}"); } catch {}
  saved[cam.src] = [cam.lat, cam.lng];
  localStorage.setItem(POS_KEY, JSON.stringify(saved));
}
function toggleEditMode(on) {
  editMode = (on === undefined) ? !editMode : on;
  $("#editPins").classList.toggle("on", editMode);
  $("#editHint").style.display = editMode ? "block" : "none";
  $("#copyPins").style.display = editMode ? "flex" : "none";
  $("#resetPins").style.display = editMode ? "flex" : "none";
  if (map) renderMarkers();   // วาดหมุดใหม่ให้ลากได้/ไม่ได้
}
/* คัดลอกพิกัดทั้งหมด (ไว้ฝังถาวรใน cameras.js หรือส่งให้ผมอัปเดตให้) */
function copyPositions() {
  const lines = CAMERAS.map(
    (c) => `${c.src}  →  lat: ${c.lat}, lng: ${c.lng},   // ${c.name}`
  ).join("\n");
  navigator.clipboard.writeText(lines)
    .then(() => showToast("คัดลอกพิกัดทั้ง 8 กล้องแล้ว — วางในแชตเพื่อให้ฝังถาวรได้"))
    .catch(() => showToast("คัดลอกไม่สำเร็จ ลองใหม่อีกครั้ง"));
}
function resetPositions() {
  localStorage.removeItem(POS_KEY);
  showToast("รีเซ็ตตำแหน่งหมุดแล้ว กำลังโหลดใหม่…");
  setTimeout(() => location.reload(), 900);
}
$("#editPins").addEventListener("click", () => toggleEditMode());
$("#copyPins").addEventListener("click", copyPositions);
$("#resetPins").addEventListener("click", resetPositions);

/* ป๊อปอัปแจ้งเตือนสั้นๆ */
let toastTimer;
function showToast(msg) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
}

/* ไปหน้าแผนที่ → ซูมไปกล้องที่เลือก → เปิดป๊อปอัปวิดีโอ */
function focusCameraOnMap(cam) {
  setView("map");                 // เปิดแผนที่ (จะ init + วาดหมุด + ปรับขนาดให้)
  setTimeout(() => {
    map.invalidateSize();
    map.setView([cam.lat, cam.lng], 17, { animate: true });
    const mk = markers[cam.src];
    if (mk) mk.openPopup();
  }, 150);                        // รอแผนที่พร้อม (สำคัญตอนเปิดแผนที่ครั้งแรก)
}

/* ================= View / layout switching ================= */
function setView(v) {
  document.querySelectorAll("#viewSeg button").forEach((b) =>
    b.classList.toggle("active", b.dataset.view === v));
  const isGrid = v === "grid";
  $("#gridView").style.display = isGrid ? "grid" : "none";
  $("#mapView").style.display = isGrid ? "none" : "block";
  // เครื่องมือของแต่ละหน้า
  $("#layoutSeg").style.display = isGrid ? "" : "none";
  $("#layoutLabel").style.display = isGrid ? "" : "none";
  $("#refreshGrid").style.display = isGrid ? "flex" : "none";
  $("#editPins").style.display = (!isGrid && IS_LOCAL) ? "flex" : "none";
  if (isGrid) { if (editMode) toggleEditMode(false); }   // ออกจากโหมดแก้หมุดเมื่อกลับไปจอภาพ
  applyPaging();                                          // อัปเดตปุ่มเปลี่ยนหน้า (ซ่อนเมื่อไม่ใช่จอภาพ)
  if (!isGrid) {
    initMap();
    renderMarkers();
    setTimeout(() => map.invalidateSize(), 60);

}
function setCols(n) {
  layoutCols = n;
  gridPage = 0;
  document.querySelectorAll("#layoutSeg button").forEach((b) =>
    b.classList.toggle("active", +b.dataset.cols === n));

document.querySelectorAll("#viewSeg button").forEach((b) =>
  b.addEventListener("click", () => setView(b.dataset.view)));
document.querySelectorAll("#layoutSeg button").forEach((b) =>
  b.addEventListener("click", () => setCols(+b.dataset.cols)));
$("#pagerPrev").addEventListener("click", () => { gridPage--; applyPaging(); });
$("#pagerNext").addEventListener("click", () => { gridPage++; applyPaging(); });

/* ดับเบิลคลิกกล้อง HLS = เต็มจอ (กล้องเทศบาลมีปุ่มเต็มจอในตัว player อยู่แล้ว) */
function toggleFullscreen(el) {
  if (document.fullscreenElement) { document.exitFullscreen(); return; }
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
  if (req) req.call(el).catch(() => {});
}
$("#gridView").addEventListener("dblclick", (e) => {
  const box = e.target.closest(".video[data-cam]");
  if (box && box.querySelector("video")) toggleFullscreen(box);
});

/* รีเฟรชเฉพาะกล้องที่เห็นในหน้านี้ (ไม่รีโหลดทั้งหน้า จึงไม่รีเซ็ตเลย์เอาต์) */
function refreshVisible() {
  if ($("#gridView").style.display === "none") return;
  const boxes = document.querySelectorAll("#gridView .tile:not(.paged-hidden) .video[data-cam]");
  boxes.forEach((box) => reloadStream(box.dataset.cam));
  showToast(`รีเฟรช ${boxes.length} กล้องในหน้านี้แล้ว`);
}
$("#refreshGrid").addEventListener("click", refreshVisible);

/* =========================================================================
 * ตรวจสุขภาพกล้องอัตโนมัติ (Auto Online/Offline)
 * -------------------------------------------------------------------------
 * ถาม go2rtc API: {gateway}/api/streams?src=<ID> ทุก HEALTH_INTERVAL วินาที
 *   - กล้องปกติ   → producer มี bytes_recv/receivers (ข้อมูลไหลจริง) = ONLINE
 *   - กล้องเสีย   → producer มีแต่ url เปล่า / ไม่มี producer      = OFFLINE
 * เมื่อกล้องกลับมาปกติ จะโหลด iframe ใหม่ให้เองเพื่อแสดงวิดีโอ
 * ตั้ง offline:true ในกล้องตัวไหน = บังคับ OFFLINE ถาวร (ข้ามการตรวจอัตโนมัติ)
 * ========================================================================= */
const HEALTH_INTERVAL = 12000;      // มิลลิวินาที (12 วินาที)
const HEALTH_TIMEOUT  = 8000;       // เวลารอ API สูงสุดต่อกล้อง
const camStatus = {};               // src -> true(online) / false(offline) / undefined(กำลังเชื่อมต่อ)

async function probeCamera(cam) {
  if (cam.offline) return false;    // บังคับ offline ด้วยมือ
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), HEALTH_TIMEOUT);

    // กล้อง HLS (กรมทางหลวง): เช็คว่าไฟล์ playlist โหลดได้และเป็น HLS จริง
    if (cam.hls) {
      const res = await fetch(cam.hls, { cache: "no-store", signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) return false;
      const txt = await res.text();
      return txt.includes("#EXTM3U");
    }

    // กล้อง gateway (เทศบาล): ถาม go2rtc API ว่ามีข้อมูลไหลจริงไหม
    const res = await fetch(
      `${CONFIG.gatewayUrl.replace(/\/$/, "")}/api/streams?src=${encodeURIComponent(cam.src)}`,
      { cache: "no-store", signal: ctrl.signal }
    );
    clearTimeout(timer);
    if (!res.ok) return false;
    const data = await res.json();
    const producers = data.producers || [];
    return producers.some(
      (p) => (p.bytes_recv || 0) > 0 || (Array.isArray(p.receivers) && p.receivers.length > 0)
    );
  } catch {
    return false;                   // ต่อไม่ได้ = ถือว่า offline
  }
}

/* ทาสถานะลง DOM ของกล้องหนึ่งตัว (badge + แผ่นคลุม) */
function applyStatus(src) {
  const online = camStatus[src];
  const badge = document.querySelector(`[data-badge="${src}"]`);
  const overlay = document.querySelector(`[data-overlay="${src}"]`);
  if (!badge || !overlay) return;

  if (online === true) {
    badge.className = "badge live";
    badge.textContent = "● LIVE";
    overlay.classList.add("hidden");
    overlay.classList.remove("connecting");
  } else if (online === false) {
    badge.className = "badge offline";
    badge.textContent = "● OFFLINE";
    overlay.classList.remove("hidden", "connecting");
    overlay.innerHTML = `<i class="ti ti-plug-connected-x"></i><div class="txt">OFFLINE</div>`;
  } else {
    badge.className = "badge";
    badge.textContent = "…";
    overlay.classList.remove("hidden");
    overlay.classList.add("connecting");
    overlay.innerHTML = `<i class="ti ti-loader-2"></i><div class="txt">กำลังเชื่อมต่อ…</div>`;
  }
}

function applyAllStatus() {
  for (const cam of CAMERAS) applyStatus(cam.src);
}

/* โหลดสตรีมใหม่ (ตอนกล้องกลับมาออนไลน์ หรือกระตุ้นให้ลองต่อซ้ำ) */
function reloadStream(src) {
  const cam = CAMERAS.find((c) => c.src === src);
  if (cam && cam.hls) {
    const box = document.querySelector(`.video[data-cam="${src}"]`);
    const v = box && box.querySelector("video");
    const tile = box && box.closest(".tile");
    const gridActive = $("#gridView").style.display !== "none";
    const visible = gridActive && !(tile && tile.classList.contains("paged-hidden"));
    if (v && visible) {   // โหลดใหม่เฉพาะกล้องที่เห็นอยู่
      if (hlsPool[src]) { try { hlsPool[src].destroy(); } catch {} }
      hlsPool[src] = playHls(v, cam.hls);
      hlsAttached[src] = true;
    }
    return;
  }
  const box = document.querySelector(`.video[data-cam="${src}"] iframe`);
  if (box) box.src = box.src;
}

async function pollHealth() {
  await Promise.all(
    CAMERAS.map(async (cam) => {
      const prev = camStatus[cam.src];
      const online = await probeCamera(cam);
      camStatus[cam.src] = online;
      if (prev !== online) {
        if (online && prev === false) reloadStream(cam.src);  // เพิ่งกลับมาออนไลน์ → โหลดใหม่
        applyStatus(cam.src);
        renderList();                                          // อัปเดตตัวนับ x/y ออนไลน์
        if (map) renderMarkers();                              // อัปเดตหมุดบนแผนที่
      } else if (online === false && !cam.offline) {
        // ยัง offline อยู่ → โหลด iframe ใหม่ (ซ่อนใต้แผ่นคลุม) เพื่อกระตุ้นให้
        // gateway ลองต่อกล้องซ้ำ จะได้ตรวจเจอทันทีเมื่อต้นทางกลับมา
        reloadStream(cam.src);
      }
    })
  );
}

/* ================= Boot ================= */
function renderAll() {
  renderFilters();
  renderList();
  renderGrid();
  renderMarkers();
}
loadPositions();   // ใช้ตำแหน่งหมุดที่เคยลากแก้ไว้ (ถ้ามี)
setView("grid");   // ตั้งค่าเริ่มต้น + ซ่อน/แสดงเครื่องมือให้ถูกหน้า
renderAll();
pollHealth();                              // ตรวจครั้งแรกทันที
setInterval(pollHealth, HEALTH_INTERVAL);  // แล้วตรวจซ้ำเรื่อยๆ
</script>
</body>
</html>
